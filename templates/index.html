<!DOCTYPE html>
<html>
<head>
    <title>RideWatch Live Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #fff; }
        #header {
            padding: 16px 24px;
            background: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e94560;
        }
        #header h1 { font-size: 22px; color: #e94560; }
        #map { height: calc(100vh - 120px); width: 100%; }
        #stats {
            padding: 10px 24px;
            background: #1a1a2e;
            display: flex;
            gap: 24px;
            font-size: 13px;
            overflow-x: auto;
        }
        .stat { color: #aaa; white-space: nowrap; }
        .stat b { font-size: 15px; }
        .d1 { color: #e94560; }
        .d2 { color: #4ade80; }
        .d3 { color: #60a5fa; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🚖 RideWatch Live Dashboard</h1>
        <div id="status" style="font-size:14px; color:#aaa">
            <span class="d1">● driver_001</span> &nbsp;
            <span class="d2">● driver_002</span> &nbsp;
            <span class="d3">● driver_003</span>
        </div>
    </div>
    <div id="stats">
        <div class="stat">driver_001 speed: <b class="d1" id="speed-driver_001">— km/h</b></div>
        <div class="stat">driver_002 speed: <b class="d2" id="speed-driver_002">— km/h</b></div>
        <div class="stat">driver_003 speed: <b class="d3" id="speed-driver_003">— km/h</b></div>
        <div class="stat">Total Updates: <b id="total-updates">0</b></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([17.4100, 78.4500], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const DRIVERS = {
            "driver_001": { emoji: "🚖", color: "#e94560", marker: null, path: [], polyline: null },
            "driver_002": { emoji: "🚕", color: "#4ade80", marker: null, path: [], polyline: null },
            "driver_003": { emoji: "🚗", color: "#60a5fa", marker: null, path: [], polyline: null },
        };

        let totalUpdates = 0;

        function connectDriver(driverId) {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(`${protocol}//${location.host}/ws/driver/${driverId}`);
            const driver = DRIVERS[driverId];

            const icon = L.divIcon({
                html: `<div style="font-size:28px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.8));">${driver.emoji}</div>`,
                className: '',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const lat = data.latitude;
                const lng = data.longitude;

                if (!driver.marker) {
                    driver.marker = L.marker([lat, lng], { icon }).addTo(map);
                } else {
                    driver.marker.setLatLng([lat, lng]);
                }

                driver.path.push([lat, lng]);
                if (driver.path.length > 300) {
                    driver.path.shift();
                }
                if (driver.polyline) map.removeLayer(driver.polyline);
                driver.polyline = L.polyline(driver.path, {
                    color: driver.color, weight: 6, opacity: 1.0
                }).addTo(map);

                totalUpdates++;
                document.getElementById(`speed-${driverId}`).textContent = data.speed + ' km/h';
                document.getElementById('total-updates').textContent = totalUpdates;
            };

            ws.onclose = () => {
                setTimeout(() => connectDriver(driverId), 3000);
            };
        }

        Object.keys(DRIVERS).forEach(connectDriver);
    </script>
</body>
</html>
